<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Cartografia da Vida</title>

<style>
:root{
 --bg:#fff;
 --text:#222;
 --empty:#EDECEC;
}

body.dark{
 --bg:#111;
 --text:#eee;
 --empty:#2a2a2a;
}

body{
 font-family:system-ui;
 background:var(--bg);
 color:var(--text);
 margin:0;
 padding:20px;
 text-align:center;
 transition:.2s;
}

/* GRID */

.grid{
 display:grid;
 grid-template-columns:repeat(12,1fr);
 gap:4px;
 max-width:900px;
 margin:0 auto;
}

.cell{
 aspect-ratio:1;
 background:var(--empty);
 border-radius:4px;
 cursor:pointer;
 transition:.12s;
}

.cell:hover{transform:scale(1.15)}

/* TOOLTIP */

.tooltip{
 position:fixed;
 bottom:15px;
 left:50%;
 transform:translateX(-50%);
 background:#222;
 color:#fff;
 padding:10px;
 border-radius:8px;
 font-size:12px;
 opacity:0;
 max-width:260px;
}

.tooltip img{
 width:100%;
 margin-top:6px;
 border-radius:6px;
}

.tooltip.show{opacity:1}

/* PANEL */

.panel{
 margin-top:30px;
 display:none;
 border-top:1px solid #ddd;
 padding-top:15px;
}

input,select,button{
 padding:8px;
 margin:4px;
 font-size:14px;
 width:90%;
 max-width:260px;
}

.cat-item{
 font-size:12px;
 margin:2px;
}

/* MOBILE */

@media(max-width:700px){
 .panel{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:var(--bg);
  border-top:2px solid #ccc;
  max-height:55vh;
  overflow:auto;
 }
}
</style>
</head>

<body>

<h2>Cartografia da Vida</h2>

<div class="grid" id="grid"></div>
<div class="tooltip" id="tooltip"></div>

<input type="password" id="pass" placeholder="senha">
<button id="loginBtn">Entrar</button>
<button id="darkBtn">🌙</button>

<div class="panel" id="panel">

<h3>Evento</h3>

<input id="year" placeholder="Ano">
<input id="month" placeholder="Mês 0-11">
<input id="note" placeholder="Descrição">
<input type="file" id="photo" accept="image/*">

<select id="cat"></select>
<button id="saveEventBtn">Salvar / Remover</button>

<hr>

<h3>Categoria</h3>

<input id="catName" placeholder="Nome">
<input type="color" id="catColor" value="#4A5568">
<button id="addCatBtn">Adicionar</button>

<div id="catList"></div>

<hr>

<button id="exportBtn">⬇ Backup</button>
<input type="file" id="importInput" style="display:none">
<button id="importBtn">⬆ Importar</button>

</div>

<script>

/* ========= CONFIG ========= */

const PASSWORD="1234";

/* ========================== */

const startYear=2015;
const years=12;

let categories={
 Trabalho:"#4A5568",
 Saúde:"#48BB78",
 Viagem:"#4299E1",
 Hobby:"#ECC94B"
};

let events=JSON.parse(localStorage.getItem("lifeEvents")||"{}");

/* ELEMENTOS */

const grid=document.getElementById("grid");
const tooltip=document.getElementById("tooltip");

const panel=document.getElementById("panel");
const passInput=document.getElementById("pass");

const yearInput=document.getElementById("year");
const monthInput=document.getElementById("month");
const noteInput=document.getElementById("note");
const photoInput=document.getElementById("photo");

const catSelect=document.getElementById("cat");
const catNameInput=document.getElementById("catName");
const catColorInput=document.getElementById("catColor");

const loginBtn=document.getElementById("loginBtn");
const darkBtn=document.getElementById("darkBtn");
const saveEventBtn=document.getElementById("saveEventBtn");
const addCatBtn=document.getElementById("addCatBtn");
const exportBtn=document.getElementById("exportBtn");
const importBtn=document.getElementById("importBtn");
const importInput=document.getElementById("importInput");

/* LOGIN */

loginBtn.onclick=()=>{
 if(passInput.value===PASSWORD){
  panel.style.display="block";
 } else alert("Senha incorreta");
};

/* DARK */

darkBtn.onclick=()=>{
 document.body.classList.toggle("dark");
};

/* GRID */

function build(){

 grid.innerHTML="";

 for(let y=0;y<years;y++){

  const year=startYear+y;

  for(let m=0;m<12;m++){

   const id=year+"-"+m;

   const cell=document.createElement("div");
   cell.className="cell";

   let label=`${m+1}/${year}`;

   if(events[id]){
    cell.style.background=categories[events[id].cat];
    label+=" — "+events[id].note;
   }

   cell.onclick=()=>{
    yearInput.value=year;
    monthInput.value=m;
    noteInput.value=events[id]?.note||"";
   };

   cell.onmouseenter=()=>showTooltip(id,label);
   cell.onmouseleave=()=>tooltip.classList.remove("show");

   grid.appendChild(cell);
  }
 }
}

/* TOOLTIP */

function showTooltip(id,text){
 tooltip.innerHTML=text;

 if(events[id]?.photo){
  tooltip.innerHTML+=`<img src="${events[id].photo}">`;
 }

 tooltip.classList.add("show");
}

/* EVENTOS */

saveEventBtn.onclick=()=>{

 const id=yearInput.value+"-"+monthInput.value;

 if(!noteInput.value){
  delete events[id];
  saveLocal();
  build();
  return;
 }

 if(photoInput.files[0]){
  const reader=new FileReader();
  reader.onload=()=>{
   events[id]={cat:catSelect.value,note:noteInput.value,photo:reader.result};
   saveLocal();
   build();
  };
  reader.readAsDataURL(photoInput.files[0]);
 }else{
  events[id]={cat:catSelect.value,note:noteInput.value};
  saveLocal();
  build();
 }
};

function saveLocal(){
 localStorage.setItem("lifeEvents",JSON.stringify(events));
}

/* CATEGORIAS */

addCatBtn.onclick=()=>{
 categories[catNameInput.value]=catColorInput.value;
 renderCats();
};

function renderCats(){
 catSelect.innerHTML="";
 for(const c in categories){
  const opt=document.createElement("option");
  opt.textContent=c;
  catSelect.appendChild(opt);
 }
}

/* BACKUP */

exportBtn.onclick=()=>{
 const blob=new Blob([JSON.stringify({categories,events},null,2)]);
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="backup.json";
 a.click();
};

importBtn.onclick=()=>importInput.click();

importInput.onchange=e=>{
 const reader=new FileReader();
 reader.onload=()=>{
  const j=JSON.parse(reader.result);
  categories=j.categories;
  events=j.events;
  saveLocal();
  renderCats();
  build();
 };
 reader.readAsText(e.target.files[0]);
};

/* INIT */

renderCats();
build();

</script>
</body>
</html>
