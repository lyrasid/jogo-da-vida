<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Cartografia da Vida</title>

<style>
:root{
 --bg:#fff;
 --text:#222;
 --empty:#EDECEC;
}

body.dark{
 --bg:#111;
 --text:#eee;
 --empty:#2a2a2a;
}

body{
 font-family:system-ui;
 background:var(--bg);
 color:var(--text);
 margin:0;
 padding:20px;
 text-align:center;
 transition:.2s;
}

/* GRID */

.grid{
 display:grid;
 grid-template-columns:repeat(12,1fr);
 gap:4px;
 max-width:900px;
 margin:0 auto;
}

.cell{
 aspect-ratio:1;
 background:var(--empty);
 border-radius:4px;
 cursor:pointer;
 transition:.12s;
}

.cell:hover{transform:scale(1.18)}

/* TOOLTIP */

.tooltip{
 position:fixed;
 bottom:15px;
 left:50%;
 transform:translateX(-50%);
 background:#222;
 color:#fff;
 padding:10px;
 border-radius:8px;
 font-size:12px;
 opacity:0;
 max-width:260px;
}

.tooltip img{
 width:100%;
 border-radius:6px;
 margin-top:6px;
}

.tooltip.show{opacity:1}

/* PANEL */

.panel{
 margin-top:30px;
 display:none;
 border-top:1px solid #ddd;
 padding-top:15px;
}

input,select,button{
 padding:8px;
 margin:5px;
 font-size:14px;
 width:90%;
 max-width:260px;
}

.cat-item{
 font-size:12px;
}

/* MOBILE */

@media(max-width:700px){

 body{padding:10px}

 .grid{
  gap:3px;
 }

 .panel{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:var(--bg);
  border-top:2px solid #ccc;
  max-height:50vh;
  overflow:auto;
 }
}
</style>
</head>

<body>

<h2>Cartografia da Vida</h2>

<div class="grid" id="grid"></div>
<div class="tooltip" id="tooltip"></div>

<input type="password" id="pass" placeholder="senha">
<button onclick="login()">Entrar</button>
<button onclick="toggleDark()">🌙</button>

<div class="panel" id="panel">

<h3>Evento</h3>

<input id="year" placeholder="Ano">
<input id="month" placeholder="Mês 0-11">
<input id="note" placeholder="Descrição">
<input type="file" id="photo" accept="image/*">

<select id="cat"></select>

<button onclick="addEvent()">Salvar / Remover</button>

<hr>

<h3>Categoria</h3>
<input id="catName" placeholder="Nome">
<input type="color" id="catColor">
<button onclick="addCategory()">Adicionar</button>

<hr>

<button onclick="exportJSON()">⬇ Backup</button>
<button onclick="importJSON()">⬆ Importar</button>

</div>

<script>

/* CONFIG */
const PASSWORD="1234";

const startYear=2015;
const years=12;

let categories={
 Trabalho:"#4A5568",
 Saúde:"#48BB78",
 Viagem:"#4299E1",
 Hobby:"#ECC94B"
};

let events=JSON.parse(localStorage.getItem("lifeEvents")||"{}");

const grid=document.getElementById("grid");
const tooltip=document.getElementById("tooltip");

/* LOGIN */

function login(){
 if(pass.value===PASSWORD){
  panel.style.display="block";
 }
}

/* GRID */

function build(){

 grid.innerHTML="";

 for(let y=0;y<years;y++){
  const year=startYear+y;

  for(let m=0;m<12;m++){

   const id=year+"-"+m;

   const cell=document.createElement("div");
   cell.className="cell";

   let label=`${m+1}/${year}`;

   if(events[id]){
    cell.style.background=categories[events[id].cat];
    label+=` — ${events[id].note}`;
   }

   cell.onclick=()=>{
    yearInput.value=year;
    monthInput.value=m;
   }

   cell.onmouseenter=()=>show(id,label);
   cell.onmouseleave=()=>tooltip.classList.remove("show");

   grid.appendChild(cell);
  }
 }
}

/* TOOLTIP */

function show(id,text){

 tooltip.innerHTML=text;

 if(events[id]?.photo){
  tooltip.innerHTML+=`<img src="${events[id].photo}">`;
 }

 tooltip.classList.add("show");
}

/* EVENTOS */

function addEvent(){

 const id=year.value+"-"+month.value;

 if(!note.value){
  delete events[id];
 } else {

  const reader=new FileReader();

  reader.onload=()=>{
   events[id]={
    cat:cat.value,
    note:note.value,
    photo:reader.result || events[id]?.photo
   };
   saveLocal();
   build();
  }

  if(photo.files[0]) reader.readAsDataURL(photo.files[0]);
  else{
   events[id]={cat:cat.value,note:note.value};
   saveLocal();
   build();
  }
}

function saveLocal(){
 localStorage.setItem("lifeEvents",JSON.stringify(events));
}

/* CATEGORIAS */

function addCategory(){
 categories[catName.value]=catColor.value;
 renderCats();
}

function renderCats(){
 cat.innerHTML="";
 for(let c in categories){
  cat.innerHTML+=`<option>${c}</option>`;
 }
}

/* DARK */

function toggleDark(){
 document.body.classList.toggle("dark");
}

/* BACKUP */

function exportJSON(){
 const blob=new Blob([JSON.stringify({categories,events},null,2)]);
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="backup.json";
 a.click();
}

function importJSON(){
 const input=document.createElement("input");
 input.type="file";
 input.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
   const j=JSON.parse(r.result);
   categories=j.categories;
   events=j.events;
   saveLocal();
   renderCats();
   build();
  }
  r.readAsText(e.target.files[0]);
 };
 input.click();
}

/* INIT */

renderCats();
build();

</script>
</body>
</html>
