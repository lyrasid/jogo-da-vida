<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Cartografia da Vida</title>

<style>
:root{
 --work:#4A5568;
 --health:#48BB78;
 --travel:#4299E1;
 --hobbies:#ECC94B;
 --empty:#EDECEC;
}

body{
 font-family:system-ui;
 background:#fff;
 padding:30px;
 text-align:center;
}

h1{font-size:22px;margin-bottom:20px}

/* GRID */

.grid{
 display:grid;
 grid-template-columns:repeat(12,minmax(14px,1fr));
 gap:4px;
 max-width:900px;
 margin:0 auto;
}

.cell{
 aspect-ratio:1;
 background:var(--empty);
 border-radius:3px;
 transition:.12s;
 cursor:pointer;
}

.cell:hover{transform:scale(1.15)}

.work{background:var(--work)}
.health{background:var(--health)}
.travel{background:var(--travel)}
.hobbies{background:var(--hobbies)}

/* TOOLTIP */

.tooltip{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 background:#222;
 color:#fff;
 padding:6px 10px;
 border-radius:6px;
 font-size:12px;
 opacity:0;
}

.tooltip.show{opacity:1}

/* PANEL */

.panel{
 margin-top:40px;
 display:none;
 border-top:1px solid #eee;
 padding-top:20px;
}

input,select,button{
 padding:6px;
 margin:4px;
 font-size:13px;
}

button{
 cursor:pointer;
}

.login{
 margin-bottom:20px;
}

</style>
</head>
<body>

<h1>Cartografia da Vida</h1>

<div class="grid" id="grid"></div>
<div class="tooltip" id="tooltip"></div>

<!-- LOGIN -->
<div class="login">
 <input type="password" id="pass" placeholder="senha do editor">
 <button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
 <h3>Novo evento</h3>

 <input id="year" placeholder="Ano">
 <input id="month" placeholder="Mês 0-11">
 <input id="note" placeholder="Descrição">

 <select id="cat">
  <option value="work">Trabalho</option>
  <option value="health">Saúde</option>
  <option value="travel">Viagem</option>
  <option value="hobbies">Hobby</option>
 </select>

 <button onclick="addEvent()">Adicionar</button>
 <button onclick="saveToGithub()">💾 Salvar no GitHub</button>
</div>

<script>

/* ======================
   CONFIGURE AQUI
====================== */

const PASSWORD = "1234";  // troque
const TOKEN = "COLE_SEU_TOKEN_AQUI";
const REPO = "SEU_USUARIO/NOME_DO_REPO";
const FILE = "data.json";

/* ====================== */

const startYear = 2015;
const years = 12;
const months = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

let data = {};

const grid = document.getElementById("grid");
const tooltip = document.getElementById("tooltip");

/* LOGIN */

function login(){
 if(document.getElementById("pass").value === PASSWORD){
  document.getElementById("panel").style.display="block";
  alert("Editor liberado");
 } else {
  alert("Senha incorreta");
 }
}

/* LOAD DATA */

async function load(){
 const res = await fetch(FILE);
 data = await res.json();
 build();
}

function build(){
 grid.innerHTML="";

 for(let y=0;y<years;y++){
  const year=startYear+y;

  for(let m=0;m<12;m++){
   const id=year+"-"+m;

   const cell=document.createElement("div");
   cell.className="cell";

   let label=months[m]+" "+year;

   if(data[id]){
    cell.classList.add(data[id].categoryId);
    label+=" — "+data[id].note;
   }

   cell.onmouseenter=()=>show(label);
   cell.onmouseleave=()=>tooltip.classList.remove("show");

   grid.appendChild(cell);
  }
 }
}

function show(text){
 tooltip.textContent=text;
 tooltip.classList.add("show");
}

/* ADD EVENT */

function addEvent(){
 const id=year.value+"-"+month.value;
 data[id]={categoryId:cat.value,note:note.value};
 build();
}

/* SAVE TO GITHUB */

async function saveToGithub(){

 const content=btoa(JSON.stringify(data,null,2));

 const file=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{
  headers:{Authorization:`token ${TOKEN}`}
 }).then(r=>r.json());

 await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{
  method:"PUT",
  headers:{
   Authorization:`token ${TOKEN}`,
   "Content-Type":"application/json"
  },
  body:JSON.stringify({
   message:"update life grid",
   content,
   sha:file.sha
  })
 });

 alert("Salvo! Atualiza em ~1 minuto");
}

load();

</script>
</body>
</html>
